name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build React app
        run: npm run build
        env:
          CI: false

      - name: Build Electron main process
        run: npm run build:electron

      - name: Build Windows
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: |
            dist-electron/*.exe
            dist-electron/*.blockmap
            dist-electron/latest.yml
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build React app
        run: npm run build
        env:
          CI: false

      - name: Build Electron main process
        run: npm run build:electron

      - name: Validate secrets
        env:
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set +e
          echo "=== Checking secrets ==="

          # 1. MAC_CERTIFICATE (CSC_LINK) - should be base64 p12
          if [ -z "$CSC_LINK" ]; then
            echo "❌ MAC_CERTIFICATE is EMPTY"
          else
            echo "✅ MAC_CERTIFICATE is set (${#CSC_LINK} chars)"
            echo "$CSC_LINK" | base64 --decode > /tmp/cert.p12 2>&1
            if [ $? -eq 0 ] && [ -s /tmp/cert.p12 ]; then
              echo "✅ MAC_CERTIFICATE is valid base64 ($(wc -c < /tmp/cert.p12) bytes decoded)"
              # Create a temp keychain and try to import
              security create-keychain -p "temppass" /tmp/test.keychain 2>&1
              IMPORT_OUTPUT=$(security import /tmp/cert.p12 -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign -k /tmp/test.keychain 2>&1)
              IMPORT_EXIT=$?
              echo "Import exit code: $IMPORT_EXIT"
              echo "Import output: $IMPORT_OUTPUT"
              if [ $IMPORT_EXIT -eq 0 ]; then
                echo "✅ MAC_CERTIFICATE_PASSWORD is correct - certificate imported successfully"
                # Show certificate identity
                security find-identity -v -p codesigning /tmp/test.keychain 2>&1
              else
                echo "❌ MAC_CERTIFICATE_PASSWORD may be wrong - failed to import certificate"
              fi
              rm -f /tmp/cert.p12
              security delete-keychain /tmp/test.keychain 2>/dev/null
            else
              echo "❌ MAC_CERTIFICATE is NOT valid base64 - did you run: base64 -i certificate.p12?"
            fi
          fi

          # 2. MAC_CERTIFICATE_PASSWORD
          if [ -z "$CSC_KEY_PASSWORD" ]; then
            echo "❌ MAC_CERTIFICATE_PASSWORD is EMPTY"
          else
            echo "✅ MAC_CERTIFICATE_PASSWORD is set (${#CSC_KEY_PASSWORD} chars)"
          fi

          # 3. APPLE_ID
          if [ -z "$APPLE_ID" ]; then
            echo "❌ APPLE_ID is EMPTY"
          else
            echo "✅ APPLE_ID is set (${#APPLE_ID} chars)"
            if echo "$APPLE_ID" | grep -q '@'; then
              echo "✅ APPLE_ID looks like an email"
            else
              echo "⚠️  APPLE_ID does not contain '@' - should be your Apple Developer email"
            fi
          fi

          # 4. APPLE_APP_SPECIFIC_PASSWORD
          if [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            echo "❌ APPLE_APP_SPECIFIC_PASSWORD is EMPTY"
          else
            echo "✅ APPLE_APP_SPECIFIC_PASSWORD is set (${#APPLE_APP_SPECIFIC_PASSWORD} chars)"
            if echo "$APPLE_APP_SPECIFIC_PASSWORD" | grep -qE '^[a-z]{4}-[a-z]{4}-[a-z]{4}-[a-z]{4}$'; then
              echo "✅ APPLE_APP_SPECIFIC_PASSWORD matches expected format (xxxx-xxxx-xxxx-xxxx)"
            else
              echo "⚠️  APPLE_APP_SPECIFIC_PASSWORD format unexpected - should be like: abcd-efgh-ijkl-mnop"
            fi
          fi

          echo "=== Done ==="

      - name: Build macOS (sign + notarize)
        timeout-minutes: 45
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: RL5P99J2T9

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            dist-electron/*.zip
            dist-electron/*.blockmap
            dist-electron/latest-mac.yml
          retention-days: 30

  release-windows:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: win-build
          path: artifacts

      - name: Create Windows Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}-windows
          name: "${{ github.ref_name }} - Windows"
          files: artifacts/**/*
          draft: false
          prerelease: false
          body: |
            ## WA1Link ${{ github.ref_name }} - Windows

            ### Downloads
            - **NSIS Installer** (.exe) - Full installer with options
            - **Portable** (.exe) - No installation required

            ### Requirements
            - Windows 10 or later (x64)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-mac:
    needs: build-mac
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: artifacts

      - name: Create macOS Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}-macos
          name: "${{ github.ref_name }} - macOS"
          files: artifacts/**/*
          draft: false
          prerelease: false
          body: |
            ## WA1Link ${{ github.ref_name }} - macOS

            ### Downloads
            - **ZIP** - Direct application bundle

            ### Requirements
            - macOS 11 (Big Sur) or later (Intel + Apple Silicon)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

