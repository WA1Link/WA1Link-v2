name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build React app
        run: npm run build
        env:
          CI: false

      - name: Build Electron main process
        run: npm run build:electron

      - name: Build Windows
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: |
            dist-electron/*.exe
            dist-electron/*.blockmap
            dist-electron/latest.yml
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build React app
        run: npm run build
        env:
          CI: false

      - name: Build Electron main process
        run: npm run build:electron

      - name: Build macOS
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip
            dist-electron/*.blockmap
            dist-electron/latest-mac.yml
          retention-days: 30

  release-windows:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: win-build
          path: artifacts

      - name: Create Windows Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}-windows
          name: "${{ github.ref_name }} - Windows"
          files: artifacts/**/*
          draft: false
          prerelease: false
          body: |
            ## WA1Link ${{ github.ref_name }} - Windows

            ### Downloads
            - **NSIS Installer** (.exe) - Full installer with options
            - **Portable** (.exe) - No installation required

            ### Requirements
            - Windows 10 or later (x64)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-mac:
    needs: build-mac
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: artifacts

      - name: Create macOS Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}-macos
          name: "${{ github.ref_name }} - macOS"
          files: artifacts/**/*
          draft: false
          prerelease: false
          body: |
            ## WA1Link ${{ github.ref_name }} - macOS

            ### Downloads
            - **DMG** - Drag and drop installer
            - **ZIP** - Direct application bundle

            ### Requirements
            - macOS 11 (Big Sur) or later (Universal: Intel + Apple Silicon)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

